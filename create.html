<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>모여 · 모임 만들기</title>
<style>
/* =======================================================================
   모여 (MOYEO) — 공통 스타일시트  (style.css)
   디자인: 흰 배경 · 둥근 카드 · 파란 그라데이션 대표색 (클린/심플)
   ※ 모든 스타일은 이 파일에서 관리합니다 (HTML 인라인 스타일 사용 안 함)
   ======================================================================= */
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");

:root{
  --grad:        linear-gradient(135deg, #4F7CFF 0%, #6AA8FF 100%);
  --grad-soft:   linear-gradient(135deg, #EEF0FF 0%, #E7F2FF 100%);
  --primary:     #4F7CFF;
  --primary-2:   #6AA8FF;

  --ink:#15172B; --ink-2:#5A5E78; --ink-3:#9A9EB5;
  --line:#ECEEF5; --line-2:#E0E3EE; --card:#FFFFFF; --bg:#F5F6FB; --fill:#F1F3FA; --stage:#DDE0EC;
  --green:#1FB573; --amber:#FF9F2E; --sky:#6AA8FF; --danger:#F0506E;

  --r-lg:24px; --r-md:16px; --r-sm:12px;
  --shadow:0 10px 34px rgba(40,46,110,.10);
  --shadow-card:0 2px 16px rgba(40,46,110,.06);
  --shadow-btn:0 10px 22px rgba(79,124,255,.28);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
  background:var(--stage);color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;overflow:hidden;letter-spacing:-.01em;word-break:keep-all;
}
.hero__tag,.hero__btn,.tab span,.badge,.seg button,.ftab,.pick,.cta,.best-btn,.textbtn,.chip,.hh-btn,.ph-tag,.rc-time b,.search span{white-space:nowrap;}

/* ===== 디바이스 프레임 ===== */
#stage{display:flex;align-items:center;justify-content:center;width:100%;height:100dvh;}
.scale-wrap{transform-origin:center center;}
.phone{position:relative;width:390px;height:844px;background:#0c0d14;border-radius:54px;padding:13px;
  box-shadow:0 44px 90px rgba(20,24,55,.42),0 0 0 2px #2a2c3a;flex:0 0 auto;}
.phone__screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:42px;
  overflow:hidden;display:flex;flex-direction:column;}
.notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:120px;height:33px;
  background:#0c0d14;border-radius:20px;z-index:60;}
@media (max-width:480px){
  body{background:var(--bg);}
  .phone{width:100vw;height:100dvh;border-radius:0;padding:0;box-shadow:none;}
  .phone__screen{border-radius:0;}
  .notch{display:none;}
}

/* ===== 상태바 ===== */
.statusbar{height:50px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px 0 32px;font-size:15px;font-weight:600;z-index:50;}
.statusbar .sb-right{display:flex;align-items:center;gap:7px;}

/* ===== 앱바 ===== */
.appbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:6px 16px 12px;}
.appbar h1{font-size:17px;font-weight:700;white-space:nowrap;}
.appbar .ab-side{min-width:56px;display:flex;align-items:center;}
.appbar .ab-side.right{justify-content:flex-end;}
.iconbtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;
  background:transparent;border-radius:11px;cursor:pointer;color:inherit;text-decoration:none;}
.iconbtn:active{background:rgba(0,0,0,.05);}
.textbtn{border:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;
  color:var(--primary);cursor:pointer;padding:6px;text-decoration:none;}
.textbtn.muted{color:var(--ink-3);}
.textbtn:active{opacity:.6;}

/* ===== 스크롤 ===== */
.scroll{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding-bottom:18px;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;}

/* ===== 진행 스텝 ===== */
.steps{display:flex;align-items:center;gap:6px;padding:2px 20px 14px;}
.steps .dot{height:4px;border-radius:4px;background:var(--line-2);flex:1;}
.steps .dot.on{background:var(--primary);}
.steps .dot.done{background:var(--primary);opacity:.4;}

.section-h{font-size:22px;font-weight:800;line-height:1.34;padding:6px 20px 14px;}
.section-h em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hint{padding:14px 20px 6px;font-size:13px;color:var(--ink-2);font-weight:700;}
.subhint{padding:0 20px 14px;font-size:12.5px;color:var(--ink-3);}
.subhint.tight{margin-top:-8px;}

/* ===== 홈 ===== */
.home-pad{padding:4px 20px 20px;}
.brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.wordmark{font-size:22px;font-weight:800;letter-spacing:.02em;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.home-greet{font-size:25px;font-weight:800;line-height:1.32;margin-bottom:16px;}
.home-greet em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:13px 15px;color:var(--ink-3);font-size:14.5px;box-shadow:var(--shadow-card);
  margin-bottom:18px;cursor:pointer;}
.hero{position:relative;background:var(--grad);border-radius:var(--r-lg);padding:22px 22px 20px;color:#fff;
  overflow:hidden;box-shadow:var(--shadow-btn);cursor:pointer;margin-bottom:18px;text-decoration:none;display:block;}
.hero__tag{display:inline-block;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.22);
  padding:4px 11px;border-radius:20px;margin-bottom:12px;letter-spacing:.02em;}
.hero h2{font-size:22px;font-weight:800;margin-bottom:8px;color:#fff;}
.hero p{font-size:13px;line-height:1.55;opacity:.94;margin-bottom:16px;max-width:235px;}
.hero__btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--primary);
  font-size:14px;font-weight:700;padding:11px 18px;border-radius:13px;}
.hero__deco{position:absolute;right:-34px;top:-34px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.13);}
.hero__deco2{position:absolute;right:34px;bottom:-52px;width:112px;height:112px;border-radius:50%;background:rgba(255,255,255,.10);}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.quick{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:16px;
  cursor:pointer;box-shadow:var(--shadow-card);transition:transform .12s;text-decoration:none;color:inherit;display:block;}
.quick:active{transform:scale(.97);}
.quick.off{opacity:.62;}
.quick .q-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.quick h3{font-size:15px;font-weight:700;margin-bottom:3px;}
.quick p{font-size:11.5px;color:var(--ink-3);line-height:1.4;}
.ic-indigo{background:#ECEBFF;color:var(--primary);}
.ic-blue{background:#E5F1FF;color:var(--sky);}
.ic-green{background:#E3F7EF;color:var(--green);}
.ic-amber{background:#FFF2E2;color:var(--amber);}

/* ===== 하단 탭바 ===== */
.tabbar{flex:0 0 auto;display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);padding:8px 8px 26px;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:transparent;
  cursor:pointer;color:var(--ink-3);font-family:inherit;padding:4px;text-decoration:none;}
.tab span{font-size:10.5px;font-weight:600;}
.tab.on{color:var(--primary);}

/* ===== 입력 필드 ===== */
.field{margin:0 20px 16px;}
.field>label{display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:8px;}
.input{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line-2);
  border-radius:14px;padding:14px 15px;font-size:15px;color:var(--ink);cursor:pointer;}
.input.placeholder{color:var(--ink-3);}
.input .grow{flex:1;}
.input svg{color:var(--ink-3);flex:0 0 auto;}

/* ===== 리스트/참여자 카드 ===== */
.list{padding:0 20px;display:flex;flex-direction:column;gap:10px;}
.list.flush{padding-left:20px;padding-right:20px;}
.pcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
  border-radius:15px;padding:13px 14px;box-shadow:var(--shadow-card);}
.pcard.add{justify-content:center;cursor:pointer;color:var(--primary);border-style:dashed;}
.pcard.add b{font-size:14px;}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#fff;flex:0 0 auto;}
.avatar.sm{width:26px;height:26px;font-size:11px;}
/* 참여자 색상 */
.av-su{background:#4F7CFF;} .av-ye{background:#1FB573;} .av-wo{background:#FF9F2E;} .av-ha{background:#6AA8FF;}
.pcard .pmeta{flex:1;min-width:0;}
.pcard .pmeta b{font-size:15px;font-weight:700;display:block;}
.pcard .pmeta b .me{color:var(--primary);font-weight:700;}
.pcard .pmeta small{font-size:12px;color:var(--ink-3);display:block;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;flex:0 0 auto;}
.badge.gps{background:#E5F1FF;color:var(--sky);}
.badge.edit{background:#F1F1F6;color:var(--ink-2);}
.badge.invited{background:#ECEBFF;color:var(--primary);}
.badge.joined{background:#E3F7EF;color:var(--green);}

/* ===== 옵션 행(위치 입력 방식) ===== */
.opt-row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
  border-radius:15px;padding:15px;cursor:pointer;box-shadow:var(--shadow-card);}
.opt-row.sel{border-color:var(--primary);background:#FAFAFF;box-shadow:0 0 0 2px rgba(79,124,255,.14);}
.opt-row .o-ic{width:40px;height:40px;border-radius:12px;background:#ECEBFF;color:var(--primary);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.opt-row .ometa{flex:1;}
.opt-row .ometa b{font-size:15px;font-weight:700;display:block;}
.opt-row .ometa small{font-size:12px;color:var(--ink-3);display:block;margin-top:2px;}
.radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--line-2);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;}
.opt-row.sel .radio{border-color:var(--primary);background:var(--primary);}
.opt-row.sel .radio::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff;}

/* ===== 이동수단 ===== */
.tcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--shadow-card);}
.tcard .trow{display:flex;align-items:center;gap:12px;}
.tcard .pmeta{flex:1;min-width:0;}
.tcard .pmeta b{display:block;font-size:15px;font-weight:700;}
.tcard .pmeta small{display:block;font-size:12px;color:var(--ink-3);margin-top:2px;}
.seg{display:flex;gap:6px;margin-top:11px;}
.seg button{flex:1;border:1px solid var(--line-2);background:var(--card);border-radius:11px;padding:9px 0;
  font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:.14s;}
.seg button.on{background:var(--grad);border-color:transparent;color:#fff;}

.tip{display:flex;gap:11px;align-items:flex-start;background:var(--grad-soft);border-radius:15px;padding:15px;margin:18px 20px 0;}
.tip.top{margin:2px 20px 16px;}
.tip .t-ic{width:34px;height:34px;border-radius:11px;background:#fff;color:var(--primary);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.tip b{font-size:13.5px;font-weight:700;display:block;margin-bottom:3px;}
.tip small{display:block;font-size:12px;color:var(--ink-2);line-height:1.45;}

/* ===== 결과: 중간지점 ===== */
.best{background:var(--grad);border-radius:var(--r-lg);padding:22px;color:#fff;position:relative;overflow:hidden;
  margin:6px 20px 18px;box-shadow:var(--shadow-btn);}
.best .btag{font-size:11.5px;font-weight:800;letter-spacing:.06em;opacity:.92;}
.best h2{font-size:26px;font-weight:800;margin:6px 0 4px;color:#fff;}
.best p{font-size:13px;opacity:.94;margin-bottom:16px;}
.best .best-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.35);color:#fff;font-size:13.5px;font-weight:700;padding:10px 16px;
  border-radius:12px;cursor:pointer;text-decoration:none;}
.best .b-deco{position:absolute;right:-26px;top:-26px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.13);}
.rank{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
  border-radius:15px;padding:14px;box-shadow:var(--shadow-card);cursor:pointer;transition:.15s;}
.rank.sel{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,124,255,.14);}
.rnum{width:30px;height:30px;border-radius:10px;background:#ECEBFF;color:var(--primary);font-weight:800;
  font-size:15px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.rank.sel .rnum{background:var(--grad);color:#fff;}
.rmeta{flex:1;}
.rmeta b{font-size:15.5px;font-weight:700;display:block;}
.rmeta small{font-size:12px;color:var(--ink-3);display:block;margin-top:2px;}
.score{font-size:17px;font-weight:800;flex:0 0 auto;color:var(--ink-2);}
.rank.sel .score{color:var(--primary);}
.score small{font-size:11px;color:var(--ink-3);font-weight:600;}

.eta-box{background:var(--card);border:1px solid var(--line);border-radius:15px;margin:6px 20px 0;box-shadow:var(--shadow-card);overflow:hidden;}
.eta-box .eb-h{font-size:13px;font-weight:700;color:var(--ink-2);padding:13px 15px 4px;}
.eta-row{display:flex;align-items:center;gap:11px;padding:9px 15px;}
.eta-row:last-child{padding-bottom:14px;}
.eta-row .ebar{flex:1;height:6px;border-radius:6px;background:var(--line);overflow:hidden;}
.eta-row .ebar i{display:block;height:100%;border-radius:6px;background:var(--grad);}
.eta-row .en{font-size:13px;font-weight:700;width:42px;}
.eta-row .et{font-size:13px;font-weight:700;color:var(--primary);width:42px;text-align:right;}
/* eta 바 길이 (인라인 대체) */
.w84{width:84%;} .w100{width:100%;} .w93{width:93%;} .w87{width:87%;}

/* ===== 지도 플레이스홀더 ===== */
.map{position:relative;height:220px;overflow:hidden;background:#E8EBF3;margin:6px 20px 0;border-radius:var(--r-md);border:1px solid var(--line);}
.map svg{position:absolute;inset:0;width:100%;height:100%;}
.map .maplabel{position:absolute;left:12px;bottom:12px;display:flex;align-items:center;gap:6px;background:#fff;
  border-radius:10px;padding:7px 11px;font-size:12px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:4;}
.pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;z-index:3;}
.pin .pn{width:30px;height:30px;border-radius:50% 50% 50% 8px;transform:rotate(45deg);
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.22);}
.pin .pn span{transform:rotate(-45deg);color:#fff;font-weight:800;font-size:13px;}
.pin.mid .pn{width:40px;height:40px;background:var(--primary);}
.pin.mid .pn span{font-size:11px;}
.pin.p1{left:33%;top:40%;} .pin.p2{left:64%;top:34%;} .pin.p3{left:55%;top:74%;} .pin.mid{left:48%;top:54%;}
.pn.c1{background:#4F7CFF;} .pn.c2{background:#1FB573;} .pn.c3{background:#FF9F2E;}
.map .radius{position:absolute;left:48%;top:54%;width:200px;height:200px;border-radius:50%;
  border:2px dashed rgba(79,124,255,.4);background:rgba(79,124,255,.07);transform:translate(-50%,-50%);z-index:1;}

/* ===== 카테고리(대분류 + 소분류 아코디언) ===== */
.cat-acc{padding:6px 20px 0;display:flex;flex-direction:column;gap:12px;}
.cat-item{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-card);overflow:hidden;}
.cat-head{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;}
.cat-item.open{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,124,255,.12);}
.cat-head .c-ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.cat-head .ch-meta{flex:1;}
.cat-head .ch-meta b{font-size:16px;font-weight:800;display:block;}
.cat-head .ch-meta small{font-size:11.5px;color:var(--ink-3);}
.cat-head .chev{color:var(--ink-3);transition:transform .25s;flex:0 0 auto;}
.cat-item.open .chev{transform:rotate(180deg);color:var(--primary);}
.cat-sub{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.cat-item.open .cat-sub{max-height:260px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 16px;}
.chip{border:1px solid var(--line-2);background:var(--fill);border-radius:20px;padding:8px 14px;
  font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;}
.chip.sel{background:var(--grad);border-color:transparent;color:#fff;}

/* ===== CTA / 토스트 / 완료 ===== */
.cta-wrap{flex:0 0 auto;padding:12px 20px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,var(--bg) 72%,rgba(245,246,251,0));}
.cta{display:block;width:100%;border:none;background:var(--grad);color:#fff;font-family:inherit;font-size:16px;
  font-weight:700;padding:16px;border-radius:16px;cursor:pointer;box-shadow:var(--shadow-btn);transition:transform .12s;
  text-align:center;text-decoration:none;}
.cta:active{transform:scale(.98);}
.cta:disabled,.cta.disabled{background:var(--line-2);color:var(--ink-3);box-shadow:none;cursor:default;pointer-events:none;}
.cta.ghost{background:var(--card);color:var(--primary);border:1px solid var(--line-2);box-shadow:var(--shadow-card);}

.toast{position:absolute;left:50%;bottom:120px;transform:translateX(-50%) translateY(14px);
  background:rgba(21,23,43,.95);color:#fff;font-size:13.5px;font-weight:600;padding:13px 20px;border-radius:14px;
  opacity:0;transition:.3s;z-index:80;white-space:nowrap;max-width:300px;text-align:center;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.complete{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
  text-align:center;padding:40px;opacity:0;visibility:hidden;transition:.4s;z-index:90;}
.complete.show{background:rgba(245,246,251,.9);backdrop-filter:blur(6px);opacity:1;visibility:visible;}
.complete .ck{width:78px;height:78px;border-radius:50%;background:var(--grad);display:flex;align-items:center;
  justify-content:center;margin-bottom:22px;box-shadow:var(--shadow-btn);transform:scale(.6);transition:.4s .1s;}
.complete.show .ck{transform:scale(1);}
.complete h2{font-size:23px;font-weight:800;margin-bottom:10px;}
.complete p{font-size:14px;color:var(--ink-2);line-height:1.6;margin-bottom:26px;}
.complete .cbtn{background:var(--grad);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:700;
  padding:14px 30px;border-radius:14px;cursor:pointer;text-decoration:none;}


/* =======================================================================
   리디자인 보정 + 신규 컴포넌트 (토스/에어비앤비 미니멀)
   ======================================================================= */
:root{
  --bg:#F7F8FB;
  --shadow-card:0 6px 22px rgba(30,40,90,.05);
  --shadow-btn:0 12px 26px rgba(79,124,255,.26);
}
/* 여백 확대 · 부드러운 카드 */
.list{gap:13px;}
.home-pad{padding:8px 20px 26px;}
.pcard,.opt-row,.tcard,.rank{border-radius:18px;border-color:#F0F1F6;}
.section-h{padding-top:10px;}

/* appbar 미니멀: 타이틀 왼정렬 옵션 */
.appbar.plain h1{font-size:18px;font-weight:800;}

/* ===== 홈: 상단 히어로 + 최근 이용 ===== */
.home-hero{display:block;margin:2px 20px 22px;padding:22px;border-radius:26px;background:var(--grad);color:#fff;
  position:relative;overflow:hidden;box-shadow:var(--shadow-btn);text-decoration:none;}
.home-hero small,.home-hero h2,.home-hero .hh-btn{position:relative;z-index:2;}
.home-hero .hh-deco{position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.14);}
.home-hero .hh-deco2{position:absolute;right:40px;bottom:-60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.10);}
.home-hero small{font-size:12.5px;font-weight:700;opacity:.92;letter-spacing:.02em;}
.home-hero h2{font-size:23px;font-weight:800;margin:8px 0 16px;line-height:1.3;}
.home-hero .hh-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--primary);
  font-size:15px;font-weight:800;padding:13px 20px;border-radius:14px;}
.home-sec{font-size:16px;font-weight:800;margin:24px 4px 13px;}

.recent{padding:0;display:flex;flex-direction:column;gap:11px;}
.recent-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid #F0F1F6;
  border-radius:18px;padding:15px;box-shadow:var(--shadow-card);cursor:pointer;text-decoration:none;color:inherit;}
.recent-card .rc-ic{width:44px;height:44px;border-radius:14px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
.recent-card .rc-meta{flex:1;min-width:0;}
.recent-card .rc-meta b{font-size:15px;font-weight:700;display:block;}
.recent-card .rc-meta small{font-size:12px;color:var(--ink-3);display:block;margin-top:3px;}
.recent-card .rc-go{color:var(--ink-3);flex:0 0 auto;}

/* 카테고리 진입 카드 (홈) — 더 큰 라운드/여백 */
.quick-grid{gap:13px;}
.quick{border-radius:20px;border-color:#F0F1F6;padding:18px;}
.quick .q-ic{width:46px;height:46px;border-radius:15px;margin-bottom:14px;}

/* ===== 결과: 중간지점 순위 (지도/BEST/점수 제거) ===== */
.rank{padding:16px 16px;}
.rank .score{display:none;}
.rcheck{width:26px;height:26px;border-radius:50%;border:2px solid var(--line-2);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;color:#fff;background:transparent;transition:.16s;}
.rcheck svg{opacity:0;transition:.16s;}
.rank.sel{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,124,255,.16);}
.rank.sel .rcheck{background:var(--grad);border-color:transparent;}
.rank.sel .rcheck svg{opacity:1;}
.rank.sel .rnum{background:var(--grad);color:#fff;}

/* ===== 카테고리: 3단계 칩 ===== */
.cat-block{padding:4px 20px 0;display:flex;flex-direction:column;gap:26px;}
.cat-group .cg-label{display:flex;align-items:baseline;gap:8px;margin-bottom:13px;}
.cat-group .cg-label b{font-size:16px;font-weight:800;}
.cat-group .cg-label span{font-size:12px;color:var(--ink-3);font-weight:600;white-space:nowrap;}
.chips{display:flex;flex-wrap:wrap;gap:10px;padding:0;}
.chip{border:1px solid var(--line-2);background:var(--card);border-radius:14px;padding:12px 17px;
  font-size:14px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:.14s;box-shadow:var(--shadow-card);}
.chip.sel{background:var(--grad);border-color:transparent;color:#fff;box-shadow:var(--shadow-btn);}

/* ===== 최종 장소 상세 ===== */
.place-hero{position:relative;height:240px;background:var(--grad);overflow:hidden;flex:0 0 auto;}
.place-hero svg{position:absolute;inset:0;width:100%;height:100%;opacity:.5;}
.place-hero .ph-deco{position:absolute;right:-30px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.12);}
.place-hero .ph-pin{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;
  background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff;}
.place-hero .ph-tag{position:absolute;left:20px;top:18px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);
  color:#fff;font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;}
.place-head{padding:18px 20px 8px;}
.place-head .pt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.place-head h2{font-size:23px;font-weight:800;line-height:1.3;}
.place-head .ptype{display:flex;align-items:center;flex-wrap:wrap;gap:4px 7px;}
.place-head .ptype .stars{display:inline-flex;align-items:center;gap:4px;font-weight:800;color:var(--ink);}
.place-head .ptype .stars svg{color:#FFB020;}
.place-head .ptype .dotsep{color:var(--ink-3);}
.place-head .stars{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:800;color:var(--ink);}
.place-head .stars svg{color:#FFB020;}
.place-head .ptype{font-size:13px;color:var(--ink-2);font-weight:600;margin-top:5px;}
.tags-row{display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px 2px;}
.tag{background:var(--fill);border-radius:11px;padding:7px 12px;font-size:12.5px;font-weight:700;color:var(--ink-2);}

.info-list{padding:6px 20px 0;}
.info-row{display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line);}
.info-row:last-child{border-bottom:none;}
.info-row .ir-ic{width:34px;height:34px;border-radius:11px;background:var(--grad-soft);color:var(--primary);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.info-row .ir-meta{flex:1;}
.info-row .ir-meta small{font-size:11.5px;color:var(--ink-3);font-weight:600;display:block;margin-bottom:3px;}
.info-row .ir-meta b{font-size:14.5px;font-weight:700;line-height:1.5;}
.info-row .ir-meta b.normal{font-weight:600;color:var(--ink-2);}

/* 참여자별 길찾기 카드 */
.route-list{padding:6px 20px 0;display:flex;flex-direction:column;gap:12px;}
.route-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid #F0F1F6;
  border-radius:18px;padding:15px;box-shadow:var(--shadow-card);}
.route-card .rc-meta{flex:1;min-width:0;}
.route-card .rc-meta b{font-size:15px;font-weight:700;display:block;margin-bottom:6px;}
.route-card .rc-path{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);font-weight:600;}
.route-card .rc-path .dot{width:6px;height:6px;border-radius:50%;background:var(--ink-3);flex:0 0 auto;}
.route-card .rc-path .arr{color:var(--ink-3);}
.route-card .rc-time{text-align:right;flex:0 0 auto;}
.route-card .rc-time b{font-size:17px;font-weight:800;color:var(--primary);display:block;}
.route-card .rc-time small{font-size:11px;color:var(--ink-3);font-weight:600;}

.block-h{font-size:16px;font-weight:800;padding:22px 20px 4px;}
.block-h small{display:block;font-size:12px;color:var(--ink-3);font-weight:600;margin-top:3px;}


/* =======================================================================
   v2 — 토스 스타일 클린 리디자인
   · 카드 모서리 12px 통일 · 그림자 최소화 · 장식 제거 · 여백 중심
   ======================================================================= */
:root{
  --r-lg:16px; --r-md:12px; --r-sm:10px;
  --ink:#191F28; --ink-2:#4E5968; --ink-3:#8B95A1;
  --line:#EFF1F5; --line-2:#E5E8EE; --fill:#F4F6F9;
  --bg:#FFFFFF; --stage:#E7EAF0;
  --shadow:0 2px 10px rgba(30,40,90,.06);
  --shadow-card:none;
  --shadow-btn:0 6px 18px rgba(79,124,255,.20);
}
body{background:var(--stage);letter-spacing:-.015em;}
.phone__screen{background:#fff;}
@media (max-width:480px){ body{background:#fff;} }

/* 장식 원 / 슬라이스 전부 제거 */
.hh-deco,.hh-deco2,.b-deco,.ph-deco,.hero__deco,.hero__deco2,.place-hero svg{display:none!important;}

/* 카드류: 12px · 1px 보더 · 그림자 제거 */
.search,.input,.quick,.recent-card,.pcard,.opt-row,.tcard,.rank,
.cat-item,.route-card,.place-cand,.dir-place{
  border-radius:12px!important;box-shadow:none!important;border:1px solid var(--line);background:#fff;
}
.section-h{font-size:24px;font-weight:800;line-height:1.32;padding:8px 20px 8px;}
.subhint.tight{margin-top:-2px;}
.subhint{font-size:13px;color:var(--ink-3);}

/* 상태바/앱바 톤 정리 */
.statusbar{height:46px;}
.appbar{padding:4px 12px 14px;}
.appbar h1,.appbar.plain h1{font-size:17px;font-weight:700;}
.steps{padding:0 20px 18px;}
.steps .dot{height:3px;}

/* ===== 홈 ===== */
.home-pad{padding:6px 20px 28px;}
.home-greet{font-size:26px;line-height:1.3;}
.search{padding:14px 16px;border-radius:12px!important;color:var(--ink-3);}
.home-hero{margin:4px 20px 28px;padding:26px 22px;border-radius:16px;box-shadow:none;}
.home-hero small{font-size:12px;font-weight:600;opacity:.9;letter-spacing:0;}
.home-hero h2{font-size:22px;font-weight:800;margin:10px 0 20px;line-height:1.34;}
.home-hero .hh-btn{padding:13px 20px;border-radius:12px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.10);}
.home-sec{font-size:17px;font-weight:800;margin:30px 4px 14px;}
.quick-grid{gap:12px;}
.quick{border-radius:12px!important;padding:18px;}
.quick .q-ic{width:44px;height:44px;border-radius:12px;margin-bottom:14px;}
.quick h3{font-size:15px;}
.quick p{font-size:12px;color:var(--ink-3);}
.recent{gap:10px;}
.recent-card{padding:15px;border-radius:12px!important;}
.recent-card .rc-ic{width:42px;height:42px;border-radius:12px;}
.ic-indigo{background:#EEF1FF;} .ic-blue{background:#EAF3FF;} .ic-green{background:#E7F7F0;} .ic-amber{background:#FFF4E6;}

/* ===== 하단 탭바 ===== */
.tabbar{padding:9px 8px 26px;background:#fff;border-top:1px solid var(--line);}

/* ===== 입력/참여자 ===== */
.field{margin:0 20px 18px;}
.input{padding:15px 16px;}
.pcard{padding:14px;gap:13px;}
.list{gap:10px;}
.badge{border-radius:8px;font-weight:600;}
.opt-row{padding:16px;}
.opt-row.sel{border-color:var(--primary);background:#F6F8FF;box-shadow:none!important;}
.opt-row .o-ic{border-radius:10px;background:#EEF1FF;}

/* ===== 이동수단 ===== */
.tcard{padding:15px;}
.seg button{border-radius:9px;font-weight:600;}
.tip,.tip.top{background:#F4F6F9;border-radius:12px;border:1px solid var(--line);}
.tip .t-ic{border-radius:10px;box-shadow:none;}

/* ===== 중간지점 순위: 체크박스 카드(단일 선택) ===== */
#ranks{gap:12px;}
.rank{padding:18px 16px;gap:14px;cursor:pointer;transition:border-color .14s,background .14s;}
.rank .rnum{width:26px;height:26px;border-radius:8px;background:var(--fill);color:var(--ink-3);font-size:14px;}
.rank.sel{border-color:var(--primary);background:#F6F8FF;box-shadow:none!important;}
.rank.sel .rnum{background:var(--grad);color:#fff;}
.rank .rmeta b{font-size:16px;}
/* 사각 체크박스 */
.rcheck{width:24px;height:24px;border-radius:7px!important;border:2px solid var(--line-2);background:#fff;
  display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;transition:.14s;}
.rcheck svg{opacity:0;transition:.14s;}
.rank.sel .rcheck{background:var(--grad);border-color:transparent;}
.rank.sel .rcheck svg{opacity:1;}

/* ===== 카테고리: 칩 (소분류 다중) ===== */
.cat-block{gap:28px;padding-top:6px;}
.chip{border-radius:10px!important;padding:11px 16px;font-weight:600;box-shadow:none!important;border:1px solid var(--line-2);background:#fff;}
.chip.sel{background:var(--grad);border-color:transparent;color:#fff;box-shadow:none!important;}
.cat-group.multi .cg-label span{color:var(--primary);}
.chip.multi{display:inline-flex;align-items:center;gap:7px;}
.chip.multi .cbox{width:16px;height:16px;border-radius:5px;border:1.8px solid var(--line-2);display:inline-flex;align-items:center;justify-content:center;color:transparent;transition:.14s;}
.chip.multi.sel .cbox{background:#fff;border-color:#fff;color:var(--primary);}

/* ===== 장소 추천 결과: 후보 카드 ===== */
.cand-list{padding:6px 20px 0;display:flex;flex-direction:column;gap:12px;}
.place-cand{display:flex;align-items:center;gap:14px;padding:14px;cursor:pointer;transition:border-color .14s,background .14s;}
.place-cand .pc-thumb{width:60px;height:60px;border-radius:10px;background:var(--grad);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;color:#fff;opacity:.92;}
.place-cand .pc-meta{flex:1;min-width:0;}
.place-cand .pc-meta b{font-size:16px;font-weight:700;display:block;}
.place-cand .pc-meta .pc-type{font-size:12.5px;color:var(--ink-3);font-weight:600;margin-top:3px;display:block;}
.place-cand .pc-meta .pc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.place-cand .pc-meta .pc-tags span{background:var(--fill);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;color:var(--ink-2);white-space:nowrap;}
.pcard.add b{white-space:nowrap;}
.place-cand .pc-rate{font-size:13px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:3px;flex:0 0 auto;align-self:flex-start;}
.place-cand .pc-rate svg{color:#FFB020;}
.place-cand .pc-check{position:absolute;}
.place-cand{position:relative;}
.place-cand.sel{border-color:var(--primary);background:#F6F8FF;}
.place-cand .pc-pick{width:24px;height:24px;border-radius:50%;border:2px solid var(--line-2);background:#fff;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;color:#fff;align-self:center;transition:.14s;}
.place-cand .pc-pick svg{opacity:0;transition:.14s;}
.place-cand.sel .pc-pick{background:var(--grad);border-color:transparent;}
.place-cand.sel .pc-pick svg{opacity:1;}

/* ===== 길찾기 결과: 최종 장소 요약 ===== */
.dir-place{margin:6px 20px 0;padding:18px;display:flex;align-items:center;gap:15px;}
.dir-place .dp-thumb{width:56px;height:56px;border-radius:10px;background:var(--grad);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;color:#fff;}
.dir-place .dp-meta small{font-size:12px;color:var(--ink-3);font-weight:600;display:block;margin-bottom:4px;}
.dir-place .dp-meta b{font-size:19px;font-weight:800;display:block;}
.dir-desc{padding:18px 20px 0;}
.dir-desc .dd-h{font-size:13px;font-weight:700;color:var(--ink-3);margin-bottom:12px;}
.dir-desc ul{list-style:none;display:flex;flex-direction:column;gap:10px;}
.dir-desc li{display:flex;align-items:center;gap:10px;font-size:14.5px;font-weight:600;color:var(--ink-2);}
.dir-desc li .ck-ic{width:20px;height:20px;border-radius:6px;background:#EEF1FF;color:var(--primary);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}

/* CTA 톤 */
.cta-wrap{background:linear-gradient(0deg,#fff 74%,rgba(255,255,255,0));}
.cta{border-radius:12px;font-weight:700;padding:16px;box-shadow:none;}
.cta:not(.disabled):not(.ghost){box-shadow:var(--shadow-btn);}

/* route 카드 정리 */
.route-card{padding:15px;border-radius:12px!important;}
.route-card .rc-path{font-weight:600;}
</style>
</head>

<script>
/* =======================================================================
   모여 (MOYEO) — 공통 스크립트
   ======================================================================= */
(function () {
  "use strict";

  function fit() {
    var wrap = document.querySelector(".scale-wrap");
    if (!wrap) return;
    if (window.innerWidth <= 480) { wrap.style.transform = "none"; return; }
    var s = Math.min((window.innerWidth - 24) / 390, (window.innerHeight - 24) / 844, 1.08);
    wrap.style.transform = "scale(" + s + ")";
  }
  window.addEventListener("resize", fit);
  window.addEventListener("load", fit);
  fit();

  var toastTimer;
  function toast(msg) {
    var el = document.getElementById("toast");
    if (!el) {
      el = document.createElement("div");
      el.className = "toast";
      el.id = "toast";
      (document.querySelector(".phone__screen") || document.body).appendChild(el);
    }
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove("show"); }, 2000);
  }

  function navigate(href) {
    location.href = href; // 수정됨: 검정화면 전환 제거
  }

  document.addEventListener("click", function (e) {
    var t = e.target.closest("[data-toast]");
    if (t) toast(t.getAttribute("data-toast"));
    var n = e.target.closest("[data-nav]");
    if (n && !n.classList.contains("disabled")) {
      e.preventDefault();
      navigate(n.getAttribute("data-nav"));
    }
  });

  var methods = document.querySelectorAll("#methods .opt-row");
  if (methods.length) {
    methods.forEach(function (row) {
      row.addEventListener("click", function () {
        methods.forEach(function (r) { r.classList.remove("sel"); });
        row.classList.add("sel");
        toast("'" + row.getAttribute("data-method") + "' 방식을 선택했어요.");
      });
    });
  }

  var OFFSET = { "대중교통": 0, "자동차": -6, "도보": 18 };
  var tlist = document.getElementById("transport-list");
  if (tlist) {
    tlist.addEventListener("click", function (e) {
      var b = e.target.closest(".seg button");
      if (!b) return;
      var card = b.closest(".tcard");
      card.querySelectorAll(".seg button").forEach(function (x) { x.classList.remove("on"); });
      b.classList.add("on");
      var base = parseInt(card.getAttribute("data-base"), 10);
      var mode = b.getAttribute("data-mode");
      var min = Math.max(8, base + (OFFSET[mode] || 0));
      var out = card.querySelector(".t-eta");
      if (out) out.textContent = min + "분";
    });
  }

  var ranks = document.querySelectorAll("#ranks .rank");
  if (ranks.length) {
    var params = new URLSearchParams(location.search);
    var stage2 = params.get("stage") === "2";
    var midCta = document.getElementById("mid-cta");
    var midBack = document.getElementById("mid-back");
    var midSub = document.getElementById("mid-sub");
    var saved = null;
    try { saved = localStorage.getItem("moyeo_center"); } catch (e) {}
    var names = Array.prototype.map.call(ranks, function (x) { return x.getAttribute("data-name"); });
    if (saved && names.indexOf(saved) > -1) {
      ranks.forEach(function (x) { x.classList.toggle("sel", x.getAttribute("data-name") === saved); });
    } else { saved = null; }
    function selectedName() {
      var s = document.querySelector("#ranks .rank.sel");
      return s ? s.getAttribute("data-name") : null;
    }
    ranks.forEach(function (r) {
      r.addEventListener("click", function () {
        ranks.forEach(function (x) { x.classList.remove("sel"); });
        r.classList.add("sel");
        try { localStorage.setItem("moyeo_center", r.getAttribute("data-name")); } catch (e) {}
      });
    });
    if (stage2) {
      if (midCta) { midCta.textContent = "길찾기 보기"; midCta.setAttribute("data-nav", "directions.html"); midCta.setAttribute("href", "directions.html"); }
      if (midBack) midBack.setAttribute("href", "place.html");
      if (midSub) midSub.textContent = "모임 장소를 확정할 중간지점을 확인하세요";
    }
    if (!saved && selectedName()) { try { localStorage.setItem("moyeo_center", selectedName()); } catch (e) {} }
  }

  var catBlock = document.querySelector(".cat-block");
  if (catBlock) {
    catBlock.addEventListener("click", function (e) {
      var chip = e.target.closest(".chip");
      if (!chip) return;
      var group = chip.closest(".cat-group");
      if (group && group.classList.contains("multi")) {
        chip.classList.toggle("sel");
      } else {
        chip.closest(".chips").querySelectorAll(".chip").forEach(function (x) { x.classList.remove("sel"); });
        chip.classList.add("sel");
      }
    });
  }

  var cands = document.querySelectorAll("#cands .place-cand");
  if (cands.length) {
    var center = null;
    try { center = localStorage.getItem("moyeo_center"); } catch (e) {}
    var cc = document.getElementById("cand-center");
    if (center && cc) cc.textContent = center;
    if (center) { document.querySelectorAll("#cands .pc-near").forEach(function (el) { el.textContent = center; }); }
    function storePlace(el) {
      try { localStorage.setItem("moyeo_place", el.getAttribute("data-name")); localStorage.setItem("moyeo_place_desc", el.getAttribute("data-desc") || ""); } catch (e) {}
    }
    var pre = document.querySelector("#cands .place-cand.sel");
    if (pre) storePlace(pre);
    cands.forEach(function (c) {
      c.addEventListener("click", function () {
        cands.forEach(function (x) { x.classList.remove("sel"); });
        c.classList.add("sel");
        storePlace(c);
      });
    });
  }

  var dirName = document.getElementById("dir-place-name");
  if (dirName) {
    var center2 = "강남역", place = "A카페", desc = "";
    try { center2 = localStorage.getItem("moyeo_center") || center2; place = localStorage.getItem("moyeo_place") || place; desc = localStorage.getItem("moyeo_place_desc") || ""; } catch (e) {}
    dirName.textContent = center2 + " " + place;
    document.querySelectorAll(".dir-dest").forEach(function (el) { el.textContent = center2; });
    var cp = document.getElementById("complete-place");
    if (cp) cp.textContent = center2 + " " + place;
    if (desc) {
      var ul = document.getElementById("dir-desc-list");
      if (ul) {
        ul.innerHTML = "";
        desc.split("·").forEach(function (line) {
          line = line.trim();
          if (!line) return;
          var li = document.createElement("li");
          li.innerHTML = '<span class="ck-ic"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>' + line;
          ul.appendChild(li);
        });
      }
    }
  }

  var confirmBtn = document.getElementById("confirm-btn") || document.getElementById("share-btn");
  if (confirmBtn) {
    confirmBtn.addEventListener("click", function () {
      var c = document.getElementById("complete");
      if (c) c.classList.add("show");
    });
  }

  window.MOYEO = { toast: toast, navigate: navigate, fit: fit };
})();
</script>
</body>
</html>
